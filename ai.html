<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>AI Guide</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { 
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; 
      background:#0a0f0a; 
      color:#86efac; 
      height:100vh; 
      display:flex; 
      flex-direction:column;
      overflow:hidden;
    }
    html { height:100%; }
    
    .top-bar { 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
      padding:10px 15px; 
      background:#0a0f0a; 
      border-bottom:1px solid rgba(74,222,128,0.1);
      flex-shrink:0;
    }
    .top-bar h1 { font-size:17px; font-weight:600; }
    .top-bar a { 
      color:#86efac; 
      text-decoration:none; 
      border:1px solid rgba(74,222,128,0.2); 
      padding:6px 12px; 
      border-radius:20px; 
      font-size:12px; 
      display:inline-block;
    }
    
    .guide-info { 
      padding:10px 15px; 
      background:rgba(34,197,94,0.05); 
      border-bottom:1px solid rgba(74,222,128,0.1);
      flex-shrink:0;
    }
    .guide-info p { font-size:13px; color:#4ade80; line-height:1.4; }
    .guide-info .tips { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
    .guide-info .tip { background:rgba(34,197,94,0.15); padding:3px 8px; border-radius:12px; font-size:11px; }
    
    iframe { 
      flex:1; 
      width:100%; 
      border:none; 
      -webkit-overflow-scrolling:touch;
      overflow-y:auto;
    }
    
    .bottom-bar { 
      display:flex; 
      gap:5px; 
      padding:8px 10px; 
      background:#0a0f0a; 
      border-top:1px solid rgba(74,222,128,0.1);
      flex-shrink:0;
    }
    .bottom-bar a { 
      flex:1; 
      text-align:center; 
      padding:10px 5px; 
      border-radius:20px; 
      text-decoration:none; 
      font-weight:600; 
      font-size:12px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      gap:3px;
      min-height:36px;
    }
    .btn-files { background:#22c55e; color:#052e16; }
    .btn-guide { background:transparent; border:1px solid rgba(74,222,128,0.3); color:#86efac; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>🤖 AI Guide</h1>
    <a href="index.html">📁 Files</a>
  </div>
  
  <div class="guide-info">
    <p><strong>🌍 Ethiopia Tour Guide AI</strong> — Ask about travel, culture, history.</p>
    <div class="tips">
      <span class="tip">🏛️ History</span>
      <span class="tip">🌄 Nature</span>
      <span class="tip">🍽️ Food</span>
      <span class="tip">✈️ Travel</span>
    </div>
  </div>
  
  <iframe src="https://ethioian-ethiopia-tour-guide.hf.space" allow="camera;microphone;geolocation"></iframe>
  
  <div class="bottom-bar">
    <a href="index.html" class="btn-files">📁 Files</a>
    <a href="#" class="btn-guide" onclick="sharePage();return false;">🔗 Share</a>
    <a href="index.html" class="btn-guide">🏠 Home</a>
  </div>
  
  <script>
    function sharePage() {
      if (navigator.share) { 
        navigator.share({title:'AI Guide - Ethiopia Tour',url:window.location.href}).catch(function(){});
      } else { 
        var input = document.createElement('input');
        input.value = window.location.href;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('Link copied!');
      }
    }
  </script>
</body>
</html>
