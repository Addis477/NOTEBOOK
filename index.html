<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Wallpapers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f0a; color: #86efac; min-height: 100vh;
      min-height: -webkit-fill-available; overflow-x: hidden;
    }
    html { height: -webkit-fill-available; }
    input, textarea { -webkit-appearance: none; outline: none; font-family: inherit; }
    button { cursor: pointer; }

    .lock-screen {
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; align-items: center; justify-content: center;
      background: #0a0f0a; padding: 1.5rem;
    }
    .lock-box { width: 100%; max-width: 340px; text-align: center; }
    .lock-box .icon { font-size: 4rem; margin-bottom: 1rem; }
    .lock-box h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    .lock-box p { font-size: 0.85rem; color: #4ade80; margin-bottom: 1.5rem; }
    .lock-box input {
      width: 100%; padding: 0.9rem; border-radius: 2rem;
      border: 1px solid rgba(74,222,128,0.3); background: rgba(34,197,94,0.05);
      color: #86efac; font-size: 1rem; text-align: center;
    }
    .lock-box .unlock-btn {
      width: 100%; padding: 0.9rem; margin-top: 0.8rem; border-radius: 2rem;
      background: #22c55e; color: #052e16; border: none; font-weight: 700; font-size: 1rem;
    }
    .lock-box .error { color: #fca5a5; font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }

    .home-page { min-height: 100vh; min-height: -webkit-fill-available; }
    .hero {
      position: relative; height: 55vh; min-height: 320px; display: flex;
      align-items: center; justify-content: center; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80') center/cover;
      filter: brightness(0.35);
    }
    .hero-content { position: relative; text-align: center; padding: 1rem; }
    .hero-content h1 { font-size: 1.8rem; font-weight: 700; color: #86efac; margin-bottom: 0.5rem; }
    .hero-content p { font-size: 0.85rem; color: #4ade80; margin-bottom: 1rem; }
    .hero-content .cta {
      display: inline-block; padding: 0.7rem 1.8rem; border-radius: 2rem;
      background: #22c55e; color: #052e16; font-weight: 600; font-size: 0.95rem; border: none;
    }
    .gallery-section { padding: 1.2rem 0.8rem; }
    .gallery-section h2 { font-size: 1.1rem; margin-bottom: 0.8rem; }
    .gallery-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;
      -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
    }
    .gallery-scroll::-webkit-scrollbar { display: none; }
    .gallery-card {
      flex: 0 0 65vw; max-width: 280px; scroll-snap-align: start;
      border-radius: 0.8rem; overflow: hidden; background: rgba(34,197,94,0.03);
      border: 1px solid rgba(74,222,128,0.1);
    }
    .gallery-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .gallery-card .info { padding: 0.5rem 0.7rem; font-size: 0.7rem; display: flex; justify-content: space-between; }

    .fab {
      position: fixed; bottom: 1rem; right: 1rem; z-index: 50;
      width: 50px; height: 50px; border-radius: 50%; background: #22c55e;
      border: none; color: #052e16; font-size: 1.4rem; box-shadow: 0 4px 20px rgba(34,197,94,0.5);
      display: flex; align-items: center; justify-content: center;
    }

    .dashboard { min-height: 100vh; padding-bottom: 5rem; }
    .dash-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 0.9rem; border-bottom: 1px solid rgba(74,222,128,0.1);
      position: sticky; top: 0; background: #0a0f0a; z-index: 10;
    }
    .dash-header h1 { font-size: 1rem; font-weight: 600; }
    .btn-back {
      background: none; border: 1px solid rgba(74,222,128,0.2);
      color: #86efac; padding: 0.3rem 0.7rem; border-radius: 1.5rem; font-size: 0.75rem;
    }
    .dash-content { padding: 0.7rem; }

    .quick-actions { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
    .quick-actions button {
      flex: 1; padding: 0.55rem 0.3rem; border-radius: 1.5rem; font-size: 0.75rem;
      font-weight: 600; border: 1px solid rgba(74,222,128,0.2);
      background: rgba(34,197,94,0.03); color: #86efac;
    }
    .quick-actions button:active { background: rgba(34,197,94,0.15); }
    input[type="file"] { display: none; }
    .status { text-align: center; font-size: 0.75rem; padding: 0.2rem; min-height: 1rem; }
    .status.ok { color: #4ade80; }
    .status.err { color: #fca5a5; }

    .folder-section { margin-bottom: 0.5rem; }
    .folder-chips { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .folder-chip {
      padding: 0.3rem 0.7rem; border-radius: 1rem; font-size: 0.7rem;
      border: 1px solid rgba(74,222,128,0.2); background: rgba(34,197,94,0.03);
      color: #86efac; cursor: pointer; font-weight: 500;
    }
    .folder-chip.active { background: #22c55e; color: #052e16; border-color: #22c55e; }

    .file-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .file-row {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(34,197,94,0.02); border: 1px solid rgba(74,222,128,0.06);
      border-radius: 0.6rem; padding: 0.45rem 0.5rem;
    }
    .file-thumb {
      width: 38px; height: 38px; border-radius: 0.35rem; flex-shrink: 0;
      background: #0a1a0a; display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; overflow: hidden;
    }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.78rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 0.62rem; color: #4ade80; }
    .file-btns { display: flex; gap: 0.15rem; flex-shrink: 0; }
    .file-btns button {
      width: 26px; height: 26px; border-radius: 0.35rem;
      border: 1px solid rgba(74,222,128,0.15);
      background: rgba(34,197,94,0.03); color: #86efac;
      font-size: 0.65rem; display: flex; align-items: center; justify-content: center;
    }
    .file-btns .del { color: #fca5a5; }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #4ade80; opacity: 0.5; }
    .empty-state span { font-size: 2rem; display: block; margin-bottom: 0.3rem; }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.5rem 0.7rem; padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
      background: #0a0f0a; border-top: 1px solid rgba(74,222,128,0.1);
      display: flex; gap: 0.3rem;
    }
    .bottom-bar button {
      flex: 1; padding: 0.55rem; border-radius: 1.5rem; font-weight: 600; font-size: 0.7rem;
    }
    .btn-green { background: #22c55e; color: #052e16; border: none; }
    .btn-ghost { background: transparent; border: 1px solid rgba(74,222,128,0.2); color: #86efac; }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 0.5rem;
    }
    .modal-inner {
      background: #0d1f0d; border-radius: 0.7rem; padding: 0.7rem;
      width: 100%; max-width: 95vw; border: 1px solid rgba(74,222,128,0.15);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-close {
      float: right; background: none; border: none; color: #86efac;
      font-size: 1.2rem; cursor: pointer; padding: 0.15rem;
    }
    .preview-img, .preview-video { width: 100%; border-radius: 0.4rem; max-height: 70vh; object-fit: contain; }
    .modal-inner h3 { margin-bottom: 0.6rem; font-size: 0.9rem; }
    .modal-inner input, .modal-inner textarea {
      width: 100%; padding: 0.6rem; border-radius: 0.5rem; margin-bottom: 0.4rem;
      border: 1px solid rgba(74,222,128,0.2); background: rgba(34,197,94,0.05);
      color: #86efac; font-size: 0.8rem;
    }
    .modal-inner textarea { min-height: 120px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
    .modal-actions button { flex: 1; padding: 0.55rem; border-radius: 1.5rem; font-weight: 600; font-size: 0.78rem; }
    .btn-save { background: #22c55e; color: #052e16; border: none; }
    .btn-cancel { background: transparent; border: 1px solid rgba(74,222,128,0.2); color: #86efac; }

    button:active, .upload-zone:active, .gallery-card:active, .folder-chip:active { opacity: 0.7; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- LOCK -->
  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <div class="icon">🔐</div><h1>Wallpapers</h1><p>Enter password</p>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off" />
      <button class="unlock-btn" onclick="doUnlock()">Unlock</button>
      <div class="error" id="lockError"></div>
      <div style="font-size:0.65rem;color:#4ade80;opacity:0.5;margin-top:0.6rem;">Default: stor-demo</div>
    </div>
  </div>

  <!-- HOME -->
  <div id="homePage" class="home-page hidden">
    <div class="hero"><div class="hero-bg"></div>
      <div class="hero-content"><h1>Curated Wallpapers</h1><p>Beautiful images for your screen</p>
        <button class="cta" onclick="openDashboard()">Explore</button>
      </div>
    </div>
    <div class="gallery-section"><h2>✨ Recent</h2><div class="gallery-scroll" id="homeGallery"></div></div>
    <button class="fab" onclick="openDashboard()">📁</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="dashboard hidden">
    <div class="dash-header"><h1>📁 My Files</h1><button class="btn-back" onclick="goHome()">← Home</button></div>
    <div class="dash-content">
      <div class="quick-actions">
        <button onclick="document.getElementById('fileInput').click()">📤 Upload</button>
        <button onclick="openCreateFile()">📝 New File</button>
        <button onclick="openCreateFolder()">📁 New Folder</button>
      </div>
      <input type="file" id="fileInput" multiple accept="*/*" />
      <div class="folder-section"><div class="folder-chips" id="folderChips"></div></div>
      <div class="status" id="status"></div>
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="bottom-bar">
      <button class="btn-ghost" onclick="goHome()">🏠</button>
      <button class="btn-green" onclick="document.getElementById('fileInput').click()">📤</button>
      <button class="btn-ghost" onclick="openCreateFile()">📝</button>
      <button class="btn-ghost" onclick="openCreateFolder()">📁</button>
      <button class="btn-ghost" onclick="refreshAll()">🔄</button>
      <button class="btn-ghost" onclick="doLock()">🔒</button>
    </div>
  </div>

  <!-- MODALS -->
  <div id="createFileModal" class="modal hidden"><div class="modal-inner">
    <button class="modal-close" onclick="closeModal('createFileModal')">✕</button>
    <h3>📝 New File</h3><input type="text" id="newFileName" placeholder="filename.txt" /><textarea id="newFileContent" placeholder="Content..."></textarea>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('createFileModal')">Cancel</button><button class="btn-save" onclick="createFile()">💾 Save</button></div>
  </div></div>

  <div id="createFolderModal" class="modal hidden"><div class="modal-inner">
    <button class="modal-close" onclick="closeModal('createFolderModal')">✕</button>
    <h3>📁 New Folder</h3><input type="text" id="newFolderName" placeholder="Folder name" />
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('createFolderModal')">Cancel</button><button class="btn-save" onclick="createFolder()">Create</button></div>
  </div></div>

  <div id="editFileModal" class="modal hidden"><div class="modal-inner">
    <button class="modal-close" onclick="closeModal('editFileModal')">✕</button>
    <h3 id="editFileTitle">✏️ Edit</h3><textarea id="editFileContent"></textarea>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('editFileModal')">Cancel</button><button class="btn-save" onclick="saveEdit()">💾 Save</button></div>
  </div></div>

  <div id="previewModal" class="modal hidden" onclick="if(event.target===this)closeModal('previewModal')"><div class="modal-inner">
    <button class="modal-close" onclick="closeModal('previewModal')">✕</button><div id="previewContent"></div>
  </div></div>

  <script>
    const PASSWORD = 'stor-demo';
    const STORAGE_KEY = 'my_files_list';
    const UPLOAD_URL = 'https://api.cloudinary.com/v1_1/dgdlrlyct/auto/upload';
    const UPLOAD_PRESET = 'stor_upload';
    let currentFolder = '';
    let editIndex = -1;

    function $(id) { return document.getElementById(id); }
    function show(id) { $(id).classList.remove('hidden'); }
    function hide(id) { $(id).classList.add('hidden'); }
    function closeModal(id) { hide(id); }

    function doUnlock() {
      if ($('passwordInput').value === PASSWORD) { hide('lockScreen'); show('homePage'); $('lockError').textContent = ''; loadGallery(); }
      else { $('lockError').textContent = 'Wrong password'; $('passwordInput').value = ''; }
    }
    function doLock() { hide('homePage'); hide('dashboardPage'); show('lockScreen'); $('passwordInput').value = ''; $('lockError').textContent = ''; }
    $('passwordInput').addEventListener('keyup', e => { if (e.key === 'Enter') doUnlock(); });

    function getFiles() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
    function saveFiles(f) { localStorage.setItem(STORAGE_KEY, JSON.stringify(f)); }
    function fmtSize(b) { if (!b) return '0 B'; if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1) + ' KB'; return (b/1048576).toFixed(1) + ' MB'; }
    function icon(fmt) {
      const i = { jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', mp4:'🎬', mov:'🎬', mp3:'🎵', wav:'🎵', pdf:'📕', doc:'📝', txt:'📄', zip:'📦', folder:'📁' };
      return i[(fmt||'').toLowerCase()] || '📄';
    }

    function getFolders() {
      const folders = new Set();
      getFiles().forEach(f => { if (f.folder) folders.add(f.folder); });
      return [...folders];
    }

    function refreshAll() { loadGallery(); loadFolderChips(); loadList(); }

    function loadGallery() {
      const files = getFiles().filter(f => ['jpg','jpeg','png','gif','webp'].includes((f.format||'').toLowerCase()));
      const el = $('homeGallery');
      if (!files.length) { el.innerHTML = '<p style="color:#4ade80;opacity:0.5;padding:1rem;font-size:0.8rem;">No images yet. Upload some!</p>'; return; }
      el.innerHTML = files.slice(0,10).map(f => `<div class="gallery-card" onclick="openDashboard()"><img src="${f.url}" loading="lazy" /><div class="info"><span>${f.name}</span><span>${fmtSize(f.bytes)}</span></div></div>`).join('');
    }

    function loadFolderChips() {
      const folders = getFolders();
      const el = $('folderChips');
      let html = `<span class="folder-chip${currentFolder===''?' active':''}" onclick="setFolder('')">📂 All</span>`;
      folders.forEach(f => { html += `<span class="folder-chip${currentFolder===f?' active':''}" onclick="setFolder('${f}')">📁 ${f}</span>`; });
      el.innerHTML = html;
    }

    function setFolder(f) { currentFolder = f; loadFolderChips(); loadList(); }

    function loadList() {
      let files = getFiles();
      if (currentFolder) files = files.filter(f => f.folder === currentFolder);
      const el = $('fileList');
      if (!files.length) { el.innerHTML = '<div class="empty-state"><span>📂</span>No files here</div>'; return; }
      el.innerHTML = files.map((f,i) => {
        const realIndex = getFiles().indexOf(f);
        const isImg = ['jpg','jpeg','png','gif','webp'].includes((f.format||'').toLowerCase());
        return `<div class="file-row">
          <div class="file-thumb" onclick="preview(${realIndex})">${isImg ? `<img src="${f.url}" loading="lazy" />` : icon(f.format)}</div>
          <div class="file-info" onclick="preview(${realIndex})"><div class="file-name">${f.name}</div><div class="file-meta">${fmtSize(f.bytes)} · ${f.format||'file'}${f.folder?' · 📁'+f.folder:''}</div></div>
          <div class="file-btns">
            <button onclick="copyUrl('${f.url}')">📋</button>
            <button onclick="downloadFile('${f.url}','${f.name}')">⬇️</button>
            <button onclick="openEdit(${realIndex})">✏️</button>
            <button class="del" onclick="delFile(${realIndex})">🗑</button>
          </div></div>`;
      }).join('');
    }

    function openCreateFile() { $('newFileName').value = ''; $('newFileContent').value = ''; show('createFileModal'); $('newFileName').focus(); }
    function createFile() {
      const name = $('newFileName').value.trim(), content = $('newFileContent').value;
      if (!name) return alert('Enter filename');
      if (!name.includes('.')) return alert('Add extension like .txt');
      const blob = new Blob([content], { type: 'text/plain' });
      const files = getFiles();
      files.unshift({ name, url: URL.createObjectURL(blob), public_id: 'local_'+Date.now(), format: name.split('.').pop().toLowerCase(), bytes: blob.size, type: 'raw', content, folder: currentFolder, date: new Date().toISOString(), isLocal: true });
      saveFiles(files); closeModal('createFileModal'); refreshAll(); setStatus('✅ File created!');
    }

    function openCreateFolder() { $('newFolderName').value = ''; show('createFolderModal'); $('newFolderName').focus(); }
    function createFolder() {
      const name = $('newFolderName').value.trim();
      if (!name) return alert('Enter folder name');
      const files = getFiles();
      files.unshift({ name: name+'/', url: '', public_id: 'folder_'+Date.now(), format: 'folder', bytes: 0, type: 'folder', folder: name, date: new Date().toISOString(), isLocal: true });
      saveFiles(files); closeModal('createFolderModal'); refreshAll(); setStatus('📁 Folder created!');
    }

    function openEdit(i) {
      const f = getFiles()[i]; if (!f || f.format==='folder') return;
      editIndex = i; $('editFileTitle').textContent = '✏️ '+f.name;
      $('editFileContent').value = f.content || ''; show('editFileModal');
    }
    function saveEdit() {
      if (editIndex < 0) return;
      const files = getFiles(), f = files[editIndex], content = $('editFileContent').value;
      const blob = new Blob([content], { type: 'text/plain' });
      f.content = content; f.url = URL.createObjectURL(blob); f.bytes = blob.size; f.date = new Date().toISOString();
      saveFiles(files); closeModal('editFileModal'); editIndex = -1; refreshAll(); setStatus('💾 Saved!');
    }

    function preview(i) {
      const f = getFiles()[i]; if (!f) return;
      const c = $('previewContent'), fmt = (f.format||'').toLowerCase();
      if (fmt === 'folder') c.innerHTML = `<div style="text-align:center;padding:2rem;"><p style="font-size:3rem;">📁</p><p>${f.folder}</p></div>`;
      else if (f.content !== undefined && ['txt','md','json','html','css','js'].includes(fmt)) c.innerHTML = `<h3>📄 ${f.name}</h3><pre style="white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,0.3);padding:0.6rem;border-radius:0.4rem;max-height:60vh;overflow-y:auto;font-size:0.75rem;">${escapeHtml(f.content)}</pre>`;
      else if (['jpg','jpeg','png','gif','webp'].includes(fmt)) c.innerHTML = `<img src="${f.url}" class="preview-img" />`;
      else if (['mp4','mov','webm'].includes(fmt)) c.innerHTML = `<video src="${f.url}" controls class="preview-video"></video>`;
      else if (['mp3','wav','ogg'].includes(fmt)) c.innerHTML = `<div style="text-align:center;padding:2rem;"><h3>🎵 ${f.name}</h3><audio src="${f.url}" controls style="width:100%;"></audio></div>`;
      else if (fmt === 'pdf') c.innerHTML = `<iframe src="${f.url}" style="width:100%;height:70vh;border:none;border-radius:0.4rem;"></iframe>`;
      else c.innerHTML = `<div style="text-align:center;padding:2rem;"><p style="font-size:3rem;">${icon(fmt)}</p><p>${f.name}</p><a href="${f.url}" target="_blank" style="color:#4ade80;">Open File</a></div>`;
      show('previewModal');
    }
    function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function delFile(i) { if (!confirm('Delete?')) return; const f = getFiles(); f.splice(i,1); saveFiles(f); refreshAll(); }
    function copyUrl(u) { if (!u) return; navigator.clipboard.writeText(u).then(()=>setStatus('✅ Copied!')).catch(()=>prompt('Copy:',u)); }
    function downloadFile(u,n) { if (!u) return; const a=document.createElement('a'); a.href=u; a.download=n; a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
    function setStatus(msg) { const s = $('status'); s.textContent = msg; s.className = 'status ok'; setTimeout(()=>{s.textContent='';s.className='status';},2000); }

    $('fileInput').addEventListener('change', async function() {
      const files = this.files; if (!files.length) return;
      const status = $('status'); const current = getFiles(); let done = 0;
      for (let file of files) {
        status.textContent = 'Uploading '+file.name+'...'; status.className = 'status';
        const fd = new FormData(); fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET);
        if (currentFolder) fd.append('folder', currentFolder);
        try {
          const r = await fetch(UPLOAD_URL,{method:'POST',body:fd}); const d = await r.json();
          if (d.secure_url) { current.unshift({name:file.name,url:d.secure_url,public_id:d.public_id,format:d.format||file.name.split('.').pop(),bytes:d.bytes||file.size,folder:currentFolder||'',date:new Date().toISOString()}); done++; }
        } catch(e) {}
      }
      saveFiles(current); refreshAll();
      status.textContent = done ? `✅ ${done} uploaded` : '❌ Failed';
      status.className = done ? 'status ok' : 'status err';
      this.value = '';
      setTimeout(()=>{status.textContent='';status.className='status';},2500);
    });

    function openDashboard() { hide('homePage'); show('dashboardPage'); loadFolderChips(); loadList(); }
    function goHome() { hide('dashboardPage'); show('homePage'); loadGallery(); }

    loadGallery(); loadFolderChips(); loadList();
  </script>
</body>
</html>
