<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Wallpaper Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f0a;
      color: #e2ffe2;
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    /* HOME PAGE */
    .home-page {
      min-height: 100vh;
      position: relative;
    }
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover;
      filter: brightness(0.35) sepia(0.2) hue-rotate(40deg);
      z-index: 0;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    .hero-content h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #86efac, #22c55e, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-content p {
      font-size: 1.3rem;
      color: #86efac;
      margin-bottom: 2rem;
    }
    .hero-content button {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      border-radius: 3rem;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(74,222,128,0.4);
      color: #86efac;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      font-weight: 500;
    }
    .hero-content button:hover {
      background: rgba(34,197,94,0.3);
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(34,197,94,0.2);
    }
    .gallery-section {
      padding: 4rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-section h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
      font-weight: 400;
      color: #86efac;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .gallery-card {
      border-radius: 1.5rem;
      overflow: hidden;
      background: rgba(34,197,94,0.03);
      border: 1px solid rgba(74,222,128,0.08);
      transition: transform 0.3s;
      cursor: pointer;
    }
    .gallery-card:hover { transform: translateY(-5px); border-color: rgba(74,222,128,0.3); }
    .gallery-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }
    .gallery-card .info {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #6ee7a7;
    }
    .login-fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 50;
      padding: 0.8rem 1.5rem;
      border-radius: 3rem;
      background: rgba(34,197,94,0.8);
      border: none;
      color: #052e16;
      cursor: pointer;
      font-weight: 700;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .login-fab:hover { background: #22c55e; transform: scale(1.05); }

    /* LOGIN */
    .login-overlay {
      position: fixed; inset: 0; background: rgba(5,20,5,0.9);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .login-box {
      background: #0d1f0d;
      border-radius: 2rem;
      padding: 2.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(74,222,128,0.15);
      text-align: center;
    }
    .login-box h2 { margin-bottom: 1.5rem; font-weight: 400; color: #86efac; }
    .login-box input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 2rem;
      background: rgba(34,197,94,0.05);
      border: 1px solid rgba(74,222,128,0.2);
      color: #86efac;
      font-size: 1rem;
      outline: none;
      margin-bottom: 1rem;
    }
    .login-box input::placeholder { color: #4ade80; opacity: 0.5; }
    .login-box input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
    .login-box button {
      width: 100%;
      padding: 0.9rem;
      border-radius: 2rem;
      background: #22c55e;
      border: none;
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
    }
    .login-box button:hover { background: #16a34a; }
    .login-box .error { color: #fca5a5; font-size: 0.85rem; margin-top: 0.5rem; }

    /* DASHBOARD */
    .dashboard {
      min-height: 100vh;
      background: #0a0f0a;
    }
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(74,222,128,0.08);
      position: sticky;
      top: 0;
      background: rgba(10,15,10,0.95);
      backdrop-filter: blur(20px);
      z-index: 10;
    }
    .dash-header h1 { font-size: 1.5rem; font-weight: 500; color: #86efac; }
    .dash-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .toolbar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .toolbar button {
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid rgba(74,222,128,0.2);
      background: rgba(34,197,94,0.03);
      color: #86efac;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .toolbar button:hover { background: rgba(34,197,94,0.1); border-color: rgba(74,222,128,0.4); }
    .toolbar button.active { background: #22c55e; border-color: #22c55e; color: #052e16; font-weight: 600; }

    /* FILE LIST */
    .file-list-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .file-card {
      background: rgba(34,197,94,0.02);
      border: 1px solid rgba(74,222,128,0.08);
      border-radius: 1.2rem;
      overflow: hidden;
      transition: all 0.2s;
    }
    .file-card:hover { background: rgba(34,197,94,0.06); transform: translateY(-2px); border-color: rgba(74,222,128,0.2); }
    .file-preview {
      width: 100%;
      height: 180px;
      background: #0a1a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .file-preview img, .file-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-preview .icon-preview {
      font-size: 4rem;
      opacity: 0.4;
    }
    .file-details {
      padding: 0.8rem 1rem;
    }
    .file-details .name {
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #86efac;
    }
    .file-details .meta {
      font-size: 0.75rem;
      color: #4ade80;
      margin-top: 0.2rem;
    }
    .file-actions-row {
      display: flex;
      gap: 0.4rem;
      padding: 0 1rem 0.8rem;
      flex-wrap: wrap;
    }
    .file-actions-row button {
      padding: 0.35rem 0.7rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(74,222,128,0.15);
      background: rgba(34,197,94,0.03);
      color: #86efac;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .file-actions-row button:hover { background: rgba(34,197,94,0.15); color: #bbf7d0; }
    .file-actions-row .del-btn { color: #fca5a5; border-color: rgba(252,165,165,0.2); }
    .file-actions-row .del-btn:hover { background: rgba(239,68,68,0.15); }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #4ade80;
      grid-column: 1 / -1;
    }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 2px dashed rgba(74,222,128,0.15);
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #86efac;
    }
    .upload-zone:hover { border-color: #22c55e; background: rgba(34,197,94,0.05); }
    .upload-zone input { display: none; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,20,5,0.9);
      display: flex; align-items: center; justify-content: center; z-index: 200;
      padding: 1rem;
    }
    .modal-box {
      background: #0d1f0d;
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(74,222,128,0.15);
    }
    .modal-box img, .modal-box video {
      width: 100%;
      border-radius: 1rem;
      max-height: 60vh;
      object-fit: contain;
    }
    .modal-box audio { width: 100%; margin: 1rem 0; }
    .modal-box iframe { width: 100%; height: 60vh; border: none; border-radius: 1rem; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: #86efac;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-box a { color: #4ade80; }

    .status-msg { padding: 0.5rem 1rem; border-radius: 1rem; font-size: 0.85rem; margin: 0.5rem 0; }
    .status-success { background: rgba(34,197,94,0.1); color: #86efac; }
    .status-error { background: rgba(239,68,68,0.1); color: #fca5a5; }

    @media (max-width: 600px) {
      .hero-content h1 { font-size: 2.5rem; }
      .file-list-view { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- HOME PAGE -->
  <div id="homePage" class="home-page">
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <h1>Curated Wallpapers</h1>
        <p>Beautiful high-resolution images for your screen</p>
        <button onclick="showLogin()">Enter Collection</button>
      </div>
    </div>
    <div class="gallery-section">
      <h2>✨ Featured</h2>
      <div class="gallery-grid" id="publicGallery"></div>
    </div>
    <button class="login-fab" onclick="showLogin()">🔑 Access Files</button>
  </div>

  <!-- LOGIN MODAL -->
  <div id="loginOverlay" class="login-overlay hidden">
    <div class="login-box">
      <h2>Access Files</h2>
      <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="off" />
      <button onclick="doLogin()">Unlock</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="dashboard hidden">
    <div class="dash-header">
      <h1>📁 File Manager</h1>
      <button onclick="goHome()" style="background:rgba(34,197,94,0.05);border:1px solid rgba(74,222,128,0.2);color:#86efac;padding:0.5rem 1.2rem;border-radius:2rem;cursor:pointer;">← Home</button>
    </div>
    <div class="dash-content">
      <!-- Upload -->
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:2rem;">📤</div>
        <p>Click to upload files</p>
        <p style="font-size:0.8rem;opacity:0.7;">Images, Videos, Audio, PDFs, Text</p>
        <input type="file" id="fileInput" multiple accept="*/*" />
      </div>
      <div id="uploadStatus"></div>

      <!-- Filters -->
      <div class="toolbar">
        <button class="active" data-filter="all" onclick="setFilter('all', this)">📋 All</button>
        <button data-filter="image" onclick="setFilter('image', this)">🖼️ Images</button>
        <button data-filter="video" onclick="setFilter('video', this)">🎬 Video</button>
        <button data-filter="audio" onclick="setFilter('audio', this)">🎵 Audio</button>
        <button data-filter="raw" onclick="setFilter('raw', this)">📄 Docs</button>
        <button onclick="loadFiles()" style="margin-left:auto;">🔄 Refresh</button>
      </div>

      <!-- File Grid -->
      <div class="file-list-view" id="fileGrid">
        <div class="empty-state"><div class="icon">📂</div>Loading...</div>
      </div>
    </div>
  </div>

  <!-- PREVIEW MODAL -->
  <div id="previewModal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closePreview()">✕</button>
      <div id="previewContent"></div>
    </div>
  </div>

  <script>
    // CONFIG
    const WORKER_URL = 'https://stor-api.bookforpeace.workers.dev';
    const APP_PASSWORD = 'stor-demo';
    const CLOUD_NAME = 'dgdlrlyct';
    const UPLOAD_PRESET = 'stor_upload';
    const UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

    let allFiles = [];
    let currentFilter = 'all';

    // HOME PAGE - load public images as gallery
    async function loadPublicGallery() {
      try {
        const res = await fetch(`${WORKER_URL}/list`);
        const data = await res.json();
        const images = (data.resources || []).filter(f => f.resource_type === 'image').slice(0, 12);
        const grid = document.getElementById('publicGallery');
        if (images.length === 0) {
          grid.innerHTML = '<p style="color:#4ade80;grid-column:1/-1;text-align:center;">No wallpapers yet. Upload some!</p>';
          return;
        }
        grid.innerHTML = images.map(f => `
          <div class="gallery-card" onclick="showLogin()">
            <img src="${f.secure_url}" alt="${f.original_filename}" loading="lazy" />
            <div class="info"><span>${f.original_filename || 'wallpaper'}</span><span>${(f.bytes/1024).toFixed(0)} KB</span></div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('publicGallery').innerHTML = '';
      }
    }

    // LOGIN
    function showLogin() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('loginPassword').focus();
    }
    function hideLogin() {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginError').textContent = '';
    }
    function doLogin() {
      if (document.getElementById('loginPassword').value === APP_PASSWORD) {
        hideLogin();
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        loadFiles();
      } else {
        document.getElementById('loginError').textContent = 'Incorrect password';
      }
    }
    document.getElementById('loginPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('loginOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideLogin();
    });

    function goHome() {
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('homePage').classList.remove('hidden');
      loadPublicGallery();
    }

    // LOAD FILES
    async function loadFiles() {
      const grid = document.getElementById('fileGrid');
      grid.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Loading files...</div>';
      try {
        const res = await fetch(`${WORKER_URL}/list`);
        const data = await res.json();
        allFiles = data.resources || [];
        renderFiles();
      } catch (e) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Failed to load. Check connection.</div>';
      }
    }

    function getFileType(file) {
      if (file.resource_type === 'video') return 'video';
      if (file.resource_type === 'image') return 'image';
      if (file.resource_type === 'raw') return 'raw';
      if (file.format === 'mp3' || file.format === 'wav' || file.format === 'ogg' || file.format === 'm4a') return 'audio';
      if (file.format === 'pdf') return 'raw';
      return 'raw';
    }

    function renderFiles() {
      const grid = document.getElementById('fileGrid');
      let files = allFiles;
      if (currentFilter !== 'all') {
        files = files.filter(f => getFileType(f) === currentFilter);
      }

      if (files.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No files found</p><p style="font-size:0.8rem;">Upload something to get started</p></div>';
        return;
      }

      grid.innerHTML = files.map(f => {
        const type = getFileType(f);
        const name = (f.original_filename || 'file') + '.' + (f.format || '');
        const kb = (f.bytes / 1024).toFixed(1);
        let preview = '';

        if (type === 'image') {
          preview = `<img src="${f.secure_url}" alt="${name}" loading="lazy" />`;
        } else if (type === 'video') {
          preview = `<video src="${f.secure_url}" muted preload="metadata"></video>`;
        } else if (type === 'audio') {
          preview = `<div class="icon-preview">🎵</div>`;
        } else {
          const icon = f.format === 'pdf' ? '📕' : '📄';
          preview = `<div class="icon-preview">${icon}</div>`;
        }

        return `
          <div class="file-card">
            <div class="file-preview" onclick="previewFile('${f.public_id}', '${type}', '${f.secure_url}', '${name}')" style="cursor:pointer;">
              ${preview}
            </div>
            <div class="file-details">
              <div class="name" title="${name}">${name}</div>
              <div class="meta">${type} · ${kb} KB</div>
            </div>
            <div class="file-actions-row">
              <button onclick="copyUrl('${f.secure_url}')">📋 Copy</button>
              <button onclick="downloadFile('${f.secure_url}','${name}')">⬇️</button>
              <button onclick="previewFile('${f.public_id}', '${type}', '${f.secure_url}', '${name}')">👁 View</button>
              <button class="del-btn" onclick="deleteFile('${f.public_id}')">🗑</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.toolbar button[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFiles();
    }

    // PREVIEW
    function previewFile(publicId, type, url, name) {
      const modal = document.getElementById('previewModal');
      const content = document.getElementById('previewContent');

      if (type === 'image') {
        content.innerHTML = `<img src="${url}" alt="${name}" />`;
      } else if (type === 'video') {
        content.innerHTML = `<video src="${url}" controls autoplay style="width:100%;max-height:60vh;border-radius:1rem;"></video>`;
      } else if (type === 'audio') {
        content.innerHTML = `<div style="text-align:center;padding:2rem;color:#86efac;"><h3>🎵 ${name}</h3><audio src="${url}" controls style="width:100%;margin-top:1rem;"></audio></div>`;
      } else if (name.endsWith('.pdf')) {
        content.innerHTML = `<iframe src="${url}"></iframe><p style="text-align:center;margin-top:0.5rem;"><a href="${url}" target="_blank">Open PDF in new tab</a></p>`;
      } else {
        content.innerHTML = `<div style="text-align:center;padding:2rem;color:#86efac;"><p>📄 ${name}</p><a href="${url}" target="_blank">Open file</a></div>`;
      }
      modal.classList.remove('hidden');
    }

    function closePreview() {
      document.getElementById('previewModal').classList.add('hidden');
      document.getElementById('previewContent').innerHTML = '';
    }
    document.getElementById('previewModal').addEventListener('click', function(e) {
      if (e.target === this) closePreview();
    });

    // UPLOAD
    document.getElementById('fileInput').addEventListener('change', async function() {
      const files = this.files;
      if (!files.length) return;
      const status = document.getElementById('uploadStatus');
      status.innerHTML = '<div class="status-msg">Uploading...</div>';
      let done = 0;
      for (let file of files) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        try {
          await fetch(UPLOAD_URL, { method: 'POST', body: fd });
          done++;
        } catch (e) {
          status.innerHTML = `<div class="status-msg status-error">Failed: ${file.name}</div>`;
          return;
        }
      }
      status.innerHTML = `<div class="status-msg status-success">✅ ${done} file(s) uploaded!</div>`;
      this.value = '';
      loadFiles();
      setTimeout(() => { status.innerHTML = ''; }, 3000);
    });

    // DELETE
    async function deleteFile(publicId) {
      if (!confirm('Delete permanently?')) return;
      await fetch(`${WORKER_URL}/delete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publicId }),
      });
      loadFiles();
    }

    // COPY
    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(() => alert('✅ URL copied!')).catch(() => prompt('Copy:', url));
    }

    // DOWNLOAD
    function downloadFile(url, name) {
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.target = '_blank';
      a.click();
    }

    // KEYBOARD
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        hideLogin();
        closePreview();
      }
    });

    // INIT
    loadPublicGallery();
    window.deleteFile = deleteFile;
    window.copyUrl = copyUrl;
    window.downloadFile = downloadFile;
    window.previewFile = previewFile;
    window.setFilter = setFilter;
    window.loadFiles = loadFiles;
    window.showLogin = showLogin;
    window.doLogin = doLogin;
    window.goHome = goHome;
    window.closePreview = closePreview;
  </script>
</body>
</html>
