<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallpaper Collection</title>
  <style>
    :root {
      --bg: #0a0f0a; --surface: #0d1f0d; --text: #86efac; --text2: #4ade80;
      --accent: #22c55e; --border: rgba(74,222,128,0.1); --danger: #fca5a5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    .hidden { display: none !important; }
    .btn {
      padding: 0.8rem 2rem; border-radius: 3rem; background: var(--accent);
      border: none; color: #052e16; cursor: pointer; font-weight: 600; font-size: 1rem;
    }
    .btn:hover { opacity: 0.9; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    .hero {
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover;
      position: relative;
    }
    .hero::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
    .hero-content { position: relative; text-align: center; }
    .hero-content h1 { font-size: 3rem; color: #86efac; margin-bottom: 1rem; }
    .login-fab {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 50;
      padding: 0.8rem 1.5rem; border-radius: 3rem; background: var(--accent);
      border: none; color: #052e16; cursor: pointer; font-weight: 700;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-box {
      background: var(--surface); border-radius: 1.5rem; padding: 2rem;
      width: 90%; max-width: 500px; border: 1px solid var(--border);
    }
    .modal-box input, .modal-box textarea {
      width: 100%; padding: 0.7rem 1rem; border-radius: 1.5rem;
      border: 1px solid var(--border); background: rgba(34,197,94,0.05);
      color: var(--text); font-size: 0.9rem; outline: none; margin: 0.4rem 0;
    }
    .modal-box textarea { min-height: 150px; resize: vertical; border-radius: 1rem; }
    .modal-close { float: right; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }

    .dash-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .dash-content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 1.5rem; padding: 2rem;
      text-align: center; margin-bottom: 1rem; cursor: pointer;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(34,197,94,0.05); }
    
    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.8rem; }
    .file-card {
      background: rgba(34,197,94,0.03); border: 1px solid var(--border);
      border-radius: 1rem; overflow: hidden;
    }
    .file-preview {
      height: 160px; background: #0a1a0a; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
    .file-preview img, .file-preview video { width: 100%; height: 100%; object-fit: cover; }
    .file-preview .icon-preview { font-size: 3rem; opacity: 0.5; }
    .file-info { padding: 0.6rem; }
    .file-info .name { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-info .meta { font-size: 0.7rem; color: var(--text2); }
    .file-actions { display: flex; gap: 0.2rem; padding: 0 0.6rem 0.6rem; flex-wrap: wrap; }
    .file-actions button {
      padding: 0.25rem 0.5rem; border-radius: 1rem; border: 1px solid var(--border);
      background: rgba(34,197,94,0.03); color: var(--text); cursor: pointer; font-size: 0.7rem;
    }
    .file-actions button:hover { background: rgba(34,197,94,0.2); }
    .empty-state { text-align: center; padding: 4rem; color: var(--text2); }

    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .toolbar button {
      padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--border);
      background: rgba(34,197,94,0.03); color: var(--text); cursor: pointer; font-size: 0.85rem;
    }
    .toolbar button.active { background: var(--accent); color: #052e16; }

    .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
    .toast {
      padding: 0.9rem 1.4rem; border-radius: 1rem; font-weight: 600;
      margin-top: 0.5rem; animation: slideUp 0.3s ease; color: #052e16;
    }
    .toast.success { background: #86efac; }
    .toast.error { background: #fca5a5; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .flex-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="homePage">
    <div class="hero">
      <div class="hero-content">
        <h1>Curated Wallpapers</h1>
        <p style="color:#86efac;margin-bottom:1.5rem;">Beautiful images for your screen</p>
        <button class="btn" onclick="showLogin()">Enter Collection</button>
      </div>
    </div>
    <button class="login-fab" onclick="showLogin()">🔑 Access Files</button>
  </div>

  <!-- LOGIN -->
  <div id="loginOverlay" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:380px;text-align:center;">
      <h2>Access Files</h2>
      <input type="password" id="loginPassword" placeholder="Password" />
      <button class="btn" onclick="doLogin()" style="width:100%;margin-top:0.5rem;">Unlock</button>
      <p id="loginError" style="color:var(--danger);margin-top:0.5rem;"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="hidden">
    <div class="dash-header">
      <h1>📁 File Manager</h1>
      <div class="flex-row">
        <button class="btn btn-sm" onclick="openCreateFile()">➕ New File</button>
        <button class="btn-outline btn-sm" onclick="goHome()">← Home</button>
      </div>
    </div>
    <div class="dash-content">
      <div class="upload-zone" id="uploadZone">
        <p><strong>📤 Click or Drop files here</strong></p>
        <input type="file" id="fileInput" multiple accept="*/*" style="display:none;" />
      </div>
      <p id="uploadStatus" style="text-align:center;font-weight:600;margin-bottom:0.5rem;"></p>

      <div class="toolbar">
        <button data-filter="all" class="active" onclick="setFilter('all',this)">All</button>
        <button data-filter="image" onclick="setFilter('image',this)">🖼️ Images</button>
        <button data-filter="video" onclick="setFilter('video',this)">🎬 Video</button>
        <button data-filter="audio" onclick="setFilter('audio',this)">🎵 Audio</button>
        <button data-filter="raw" onclick="setFilter('raw',this)">📄 Docs</button>
        <button onclick="loadFiles()">🔄 Refresh</button>
      </div>

      <div class="file-grid" id="fileGrid">
        <div class="empty-state">Loading files...</div>
      </div>
    </div>
  </div>

  <!-- PREVIEW MODAL -->
  <div id="previewModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:700px;">
      <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
      <div id="previewContent"></div>
    </div>
  </div>

  <!-- CREATE FILE MODAL -->
  <div id="createFileModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>➕ Create New File</h3>
      <input type="text" id="createFileName" placeholder="filename.txt" />
      <textarea id="createFileContent" placeholder="Content..."></textarea>
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('createFileModal')">Cancel</button>
        <button class="btn btn-sm" onclick="createFile()">Create</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>✏️ Edit File - <span id="editFileName"></span></h3>
      <textarea id="editContent"></textarea>
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('editModal')">Cancel</button>
        <button class="btn btn-sm" onclick="saveEdit()">💾 Save</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const WORKER_URL = 'https://stor-api.bookforpeace.workers.dev';
    const PASSWORD = 'stor-demo';
    const UPLOAD_URL = 'https://api.cloudinary.com/v1_1/dgdlrlyct/auto/upload';
    const UPLOAD_PRESET = 'stor_upload';

    let allFiles = [];
    let filter = 'all';
    let editTarget = null;

    function toast(msg, type) {
      type = type || 'success';
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(function() { t.remove(); }, 3000);
    }

    function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function showLogin() { showModal('loginOverlay'); }
    function doLogin() {
      if (document.getElementById('loginPassword').value === PASSWORD) {
        closeModal('loginOverlay');
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        loadFiles();
      } else {
        document.getElementById('loginError').textContent = 'Wrong password';
      }
    }
    function goHome() {
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('homePage').classList.remove('hidden');
    }

    function fs(b) {
      if (!b) return '0 B';
      var u = ['B','KB','MB','GB'], i = 0, s = b;
      while (s >= 1024 && i < 3) { s /= 1024; i++; }
      return s.toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
    }

    function getType(f) {
      if (f.resource_type === 'video') return 'video';
      if (f.resource_type === 'image') return 'image';
      var fmt = (f.format || '').toLowerCase();
      if (fmt === 'mp3' || fmt === 'wav' || fmt === 'ogg' || fmt === 'm4a') return 'audio';
      return 'raw';
    }

    function getIcon(f) {
      var fmt = (f.format || '').toLowerCase();
      var icons = { pdf: '📕', zip: '📦', doc: '📝', txt: '📄', mp3: '🎵', mp4: '🎬' };
      return icons[fmt] || '📄';
    }

    // LOAD FILES - THIS IS THE KEY FUNCTION
    async function loadFiles() {
      console.log('Loading files from: ' + WORKER_URL + '/list');
      var grid = document.getElementById('fileGrid');
      grid.innerHTML = '<div class="empty-state">⏳ Loading...</div>';
      
      try {
        var res = await fetch(WORKER_URL + '/list');
        var data = await res.json();
        console.log('Worker response:', data);
        
        allFiles = data.resources || [];
        console.log('Files found:', allFiles.length);
        
        renderFiles();
        
        if (allFiles.length > 0) {
          toast('📂 ' + allFiles.length + ' files loaded');
        }
      } catch (e) {
        console.error('Load error:', e);
        grid.innerHTML = '<div class="empty-state">❌ Failed to load. <br><small>Check console</small></div>';
        toast('Error loading files', 'error');
      }
    }

    function renderFiles() {
      var grid = document.getElementById('fileGrid');
      var files = allFiles;
      
      if (filter !== 'all') {
        files = files.filter(function(f) { return getType(f) === filter; });
      }

      if (files.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p style="font-size:3rem;">📭</p><p>No files yet</p></div>';
        return;
      }

      var html = '';
      files.forEach(function(f) {
        var type = getType(f);
        var name = (f.original_filename || 'file') + '.' + (f.format || '');
        var size = fs(f.bytes);
        var prev = '';
        
        if (type === 'image') {
          prev = '<img src="' + f.secure_url + '" loading="lazy" />';
        } else if (type === 'video') {
          prev = '<video src="' + f.secure_url + '" muted></video>';
        } else {
          prev = '<div class="icon-preview">' + getIcon(f) + '</div>';
        }

        html += '<div class="file-card">' +
          '<div class="file-preview" onclick="previewFile(\'' + type + '\',\'' + f.secure_url + '\',\'' + name + '\')">' + prev + '</div>' +
          '<div class="file-info"><div class="name">' + name + '</div><div class="meta">' + type + ' · ' + size + '</div></div>' +
          '<div class="file-actions">' +
          '<button onclick="copyUrl(\'' + f.secure_url + '\')">📋</button>' +
          '<button onclick="downloadFile(\'' + f.secure_url + '\',\'' + name + '\')">⬇️</button>' +
          '<button onclick="openEdit(\'' + f.public_id + '\',\'' + name + '\')">✏️</button>' +
          '<button style="color:var(--danger);" onclick="deleteFile(\'' + f.public_id + '\')">🗑</button>' +
          '</div></div>';
      });
      
      grid.innerHTML = html;
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.toolbar button[data-filter]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderFiles();
    }

    function previewFile(type, url, name) {
      var content = document.getElementById('previewContent');
      if (type === 'image') content.innerHTML = '<img src="' + url + '" style="width:100%;border-radius:1rem;" />';
      else if (type === 'video') content.innerHTML = '<video src="' + url + '" controls style="width:100%;border-radius:1rem;max-height:60vh;"></video>';
      else content.innerHTML = '<p style="text-align:center;padding:2rem;">📄 ' + name + '<br><a href="' + url + '" target="_blank">Open file</a></p>';
      showModal('previewModal');
    }

    async function openEdit(id, name) {
      editTarget = { id: id, name: name };
      document.getElementById('editFileName').textContent = name;
      try {
        var res = await fetch(WORKER_URL + '/get-content?publicId=' + encodeURIComponent(id));
        var data = await res.json();
        document.getElementById('editContent').value = data.content || '';
      } catch (e) {
        document.getElementById('editContent').value = '';
      }
      showModal('editModal');
    }

    async function saveEdit() {
      if (!editTarget) return;
      await fetch(WORKER_URL + '/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          publicId: editTarget.id,
          content: document.getElementById('editContent').value,
          filename: editTarget.name
        })
      });
      toast('💾 Saved!');
      closeModal('editModal');
      loadFiles();
    }

    function openCreateFile() { showModal('createFileModal'); }

    async function createFile() {
      var name = document.getElementById('createFileName').value.trim();
      var content = document.getElementById('createFileContent').value;
      if (!name) { toast('Enter filename', 'error'); return; }
      
      var res = await fetch(WORKER_URL + '/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: name, content: content, folder: '' })
      });
      var data = await res.json();
      
      if (data.success) {
        toast('✅ Created!');
        closeModal('createFileModal');
        document.getElementById('createFileName').value = '';
        document.getElementById('createFileContent').value = '';
        loadFiles();
      } else {
        toast('Failed', 'error');
      }
    }

    async function deleteFile(id) {
      if (!confirm('Delete?')) return;
      await fetch(WORKER_URL + '/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publicId: id })
      });
      toast('Deleted');
      loadFiles();
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).then(function() { toast('📋 Copied!'); });
    }

    function downloadFile(url, name) {
      var a = document.createElement('a');
      a.href = url; a.download = name; a.click();
    }

    // UPLOAD - Simple and clean
    var uploadZone = document.getElementById('uploadZone');
    var fileInput = document.getElementById('fileInput');

    uploadZone.onclick = function() { fileInput.click(); };

    uploadZone.ondragover = function(e) { e.preventDefault(); };
    uploadZone.ondrop = function(e) {
      e.preventDefault();
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    };

    fileInput.onchange = function() {
      if (this.files.length) {
        uploadFiles(this.files);
        this.value = '';
      }
    };

    async function uploadFiles(files) {
      var status = document.getElementById('uploadStatus');
      status.textContent = 'Uploading ' + files.length + ' file(s)...';
      
      var done = 0;
      for (var i = 0; i < files.length; i++) {
        var fd = new FormData();
        fd.append('file', files[i]);
        fd.append('upload_preset', UPLOAD_PRESET);
        
        try {
          await fetch(UPLOAD_URL, { method: 'POST', body: fd });
          done++;
        } catch (e) {
          console.error(e);
        }
      }
      
      status.textContent = '✅ ' + done + ' uploaded!';
      toast('✅ ' + done + ' file(s) uploaded!');
      loadFiles();
      
      setTimeout(function() { status.textContent = ''; }, 3000);
    }

    // Close modals on escape
    document.onkeydown = function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay').forEach(function(m) { m.classList.add('hidden'); });
      }
    };

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(function(m) {
      m.onclick = function(e) {
        if (e.target === m) m.classList.add('hidden');
      };
    });

    document.getElementById('loginPassword').onkeypress = function(e) {
      if (e.key === 'Enter') doLogin();
    };
  </script>
</body>
</html>
