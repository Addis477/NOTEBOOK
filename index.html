<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>stor • file manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f1c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=1200&q=80&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: brightness(0.25) blur(3px);
      z-index: -1;
    }
    .card {
      width: 100%;
      max-width: 750px;
      background: rgba(18, 22, 33, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.6);
      color: #eef2ff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .hidden { display: none !important; }
    h1 {
      font-size: 2.4rem;
      font-weight: 500;
      color: #fff;
    }
    h1 span {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    input {
      flex: 2;
      min-width: 180px;
      background: rgba(10,14,23,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 0.9rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 1rem;
      color: white;
      outline: none;
    }
    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
    }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 2.5rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); }
    .secondary-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.5rem 1.2rem;
    }
    .input-group { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .error-msg { color: #fca5a5; font-size: 0.9rem; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .upload-section {
      background: rgba(0,0,0,0.3);
      border-radius: 2rem;
      padding: 1.4rem 1.2rem;
      border: 1px dashed rgba(255,255,255,0.25);
    }
    .file-list {
      background: rgba(0,0,0,0.25);
      border-radius: 1.8rem;
      padding: 1rem;
      max-height: 350px;
      overflow-y: auto;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .file-info { display: flex; align-items: center; gap: 0.7rem; }
    .icon-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #cbd5e1;
      font-size: 1.2rem;
      padding: 0.3rem 0.5rem;
      border-radius: 0.6rem;
      cursor: pointer;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .empty-message { text-align: center; color: #94a3b8; padding: 2rem; }
    label { color: #9ca3af; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <!-- LOCKED -->
    <div id="lockedView">
      <h1>🔐 <span>stor</span></h1>
      <p style="color:#b9c2d9; margin: 0.5rem 0 1.5rem;">simple file manager</p>
      <div class="input-group">
        <input type="password" id="passwordInput" placeholder="Password" autocomplete="off" />
        <button id="unlockBtn">Unlock</button>
      </div>
      <div id="passwordError" class="error-msg"></div>
      <p style="font-size:0.8rem; color:#6b7280; margin-top:0.5rem;">Default: <strong style="color:#a78bfa;">stor-demo</strong></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardView" class="hidden">
      <div class="dashboard-header">
        <h1>📁 <span>stor</span></h1>
        <button id="logoutBtn" class="secondary-btn">Exit</button>
      </div>
      <div class="upload-section">
        <div class="input-group">
          <label for="fileInput" style="cursor:pointer; background:#4f46e5; padding:0.6rem 1.4rem; border-radius:2rem; color:white;">Choose file</label>
          <input type="file" id="fileInput" style="display:none;" multiple />
          <button id="uploadBtn">Upload</button>
        </div>
        <div id="uploadStatus" style="margin-top:0.8rem; font-size:0.9rem; color:#cbd5e1;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
        <h3>📋 Files</h3>
        <button id="refreshBtn" class="secondary-btn">Refresh</button>
      </div>
      <div id="fileList" class="file-list">
        <div class="empty-message">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    // CONFIG
    const WORKER_URL = 'https://stor-api.bookforpeace.workers.dev';
    const APP_PASSWORD = 'stor-demo';
    const CLOUD_NAME = 'dgdlrlyct';
    const UPLOAD_PRESET = 'stor_upload';
    const UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`;

    // DOM
    const lockedView = document.getElementById('lockedView');
    const dashboardView = document.getElementById('dashboardView');
    const passwordInput = document.getElementById('passwordInput');
    const passwordError = document.getElementById('passwordError');
    const unlockBtn = document.getElementById('unlockBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const fileList = document.getElementById('fileList');

    // FETCH FILES FROM WORKER
    async function loadFiles() {
      fileList.innerHTML = '<div class="empty-message">Loading...</div>';
      try {
        const res = await fetch(`${WORKER_URL}/list`);
        const data = await res.json();
        const files = data.resources || [];
        if (files.length === 0) {
          fileList.innerHTML = '<div class="empty-message">✨ No files yet. Upload something!</div>';
          return;
        }
        let html = '';
        files.forEach(f => {
          const name = (f.original_filename || 'file') + '.' + (f.format || '');
          const kb = (f.bytes / 1024).toFixed(1);
          html += `
            <div class="file-item">
              <div class="file-info"><span>📄</span><div><strong>${name}</strong><br><small style="color:#9ca3af;">${kb} KB</small></div></div>
              <div class="file-actions">
                <a href="${f.secure_url}" target="_blank" class="icon-btn">👁️</a>
                <button class="icon-btn" onclick="copyUrl('${f.secure_url}')">📋</button>
                <button class="icon-btn" onclick="deleteFile('${f.public_id}')">🗑️</button>
              </div>
            </div>`;
        });
        fileList.innerHTML = html;
      } catch (e) {
        fileList.innerHTML = '<div class="empty-message">⚠️ Error loading files</div>';
      }
    }

    // COPY
    window.copyUrl = (url) => {
      navigator.clipboard.writeText(url).then(() => alert('URL copied!'));
    };

    // DELETE
    window.deleteFile = async (publicId) => {
      if (!confirm('Delete this file permanently?')) return;
      await fetch(`${WORKER_URL}/delete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publicId }),
      });
      loadFiles();
    };

    // UPLOAD
    async function uploadFiles(files) {
      uploadStatus.textContent = `Uploading ${files.length} file(s)...`;
      for (let file of files) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        try {
          await fetch(UPLOAD_URL, { method: 'POST', body: fd });
        } catch (e) {
          uploadStatus.textContent = 'Upload failed';
          return;
        }
      }
      uploadStatus.textContent = '✅ Done!';
      fileInput.value = '';
      loadFiles();
    }

    // AUTH
    unlockBtn.onclick = () => {
      if (passwordInput.value === APP_PASSWORD) {
        lockedView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
        loadFiles();
      } else {
        passwordError.textContent = 'Wrong password';
      }
    };
    passwordInput.onkeypress = (e) => { if (e.key === 'Enter') unlockBtn.click(); };
    logoutBtn.onclick = () => {
      dashboardView.classList.add('hidden');
      lockedView.classList.remove('hidden');
      passwordInput.value = '';
    };

    // BUTTONS
    uploadBtn.onclick = () => {
      if (fileInput.files.length) uploadFiles(fileInput.files);
      else uploadStatus.textContent = 'Select a file first';
    };
    refreshBtn.onclick = loadFiles;
  </script>
</body>
</html>
