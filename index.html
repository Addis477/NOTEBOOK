<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Wallpaper Collection</title>
  <style>
    :root {
      --bg: #0a0f0a; --surface: #0d1f0d; --text: #86efac; --text2: #4ade80;
      --accent: #22c55e; --accent2: #16a34a; --border: rgba(74,222,128,0.1);
      --danger: #fca5a5; --shadow: rgba(34,197,94,0.15);
    }
    .light-mode {
      --bg: #f0fdf4; --surface: #fff; --text: #166534; --text2: #15803d;
      --accent: #22c55e; --accent2: #16a34a; --border: rgba(34,197,94,0.2);
      --danger: #dc2626; --shadow: rgba(34,197,94,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; transition: all 0.3s;
    }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* HOME */
    .hero {
      position: relative; height: 100vh; display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80') center/cover;
      filter: brightness(0.35) sepia(0.2) hue-rotate(40deg); z-index: 0;
    }
    .hero-content { position: relative; z-index: 1; text-align: center; padding: 2rem; }
    .hero-content h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700;
      background: linear-gradient(135deg, #86efac, #22c55e, #4ade80);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-content p { font-size: 1.3rem; color: var(--text); margin: 1rem 0 2rem; }
    .hero-content button, .btn {
      padding: 0.8rem 2rem; font-size: 1rem; border-radius: 3rem;
      background: var(--accent); border: none; color: #052e16; cursor: pointer;
      font-weight: 600; transition: all 0.2s;
    }
    .hero-content button:hover, .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--text);
    }
    .btn-outline:hover { background: rgba(34,197,94,0.1); }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .gallery-section { padding: 4rem 2rem; max-width: 1400px; margin: 0 auto; }
    .gallery-section h2 { font-size: 2rem; margin-bottom: 2rem; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .gallery-card {
      border-radius: 1.5rem; overflow: hidden; background: rgba(34,197,94,0.03);
      border: 1px solid var(--border); transition: transform 0.3s; cursor: pointer;
    }
    .gallery-card:hover { transform: translateY(-5px); }
    .gallery-card img { width: 100%; height: 250px; object-fit: cover; }
    .gallery-card .info { padding: 1rem; display: flex; justify-content: space-between; font-size: 0.85rem; }
    .login-fab {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 50;
      padding: 0.8rem 1.5rem; border-radius: 3rem; background: var(--accent);
      border: none; color: #052e16; cursor: pointer; font-weight: 700;
    }

    /* LOGIN */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,20,5,0.9);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .modal-box {
      background: var(--surface); border-radius: 1.5rem; padding: 2rem;
      width: 90%; max-width: 500px; border: 1px solid var(--border);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%; padding: 0.7rem 1rem; border-radius: 1.5rem;
      border: 1px solid var(--border); background: rgba(34,197,94,0.05);
      color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit;
      margin: 0.4rem 0;
    }
    .modal-box textarea { border-radius: 1rem; min-height: 150px; resize: vertical; }
    .modal-box input:focus, .modal-box textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--shadow);
    }
    .modal-close { float: right; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
    .flex-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }

    /* DASHBOARD */
    .dash-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); backdrop-filter: blur(20px);
      z-index: 10; flex-wrap: wrap; gap: 0.5rem;
    }
    .dash-content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .toolbar button, .toolbar select {
      padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--border);
      background: rgba(34,197,94,0.03); color: var(--text); cursor: pointer; font-size: 0.85rem;
    }
    .toolbar button.active, .toolbar button:hover { background: var(--accent); border-color: var(--accent); color: #052e16; }
    .search-box {
      flex: 1; min-width: 200px; padding: 0.5rem 1rem; border-radius: 2rem;
      border: 1px solid var(--border); background: rgba(34,197,94,0.03);
      color: var(--text); font-size: 0.85rem; outline: none;
    }

    /* FILE GRID */
    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.8rem; }
    .file-grid.list { grid-template-columns: 1fr; }
    .file-card {
      background: rgba(34,197,94,0.02); border: 1px solid var(--border);
      border-radius: 1rem; overflow: hidden; transition: all 0.2s; position: relative;
    }
    .file-card:hover { background: rgba(34,197,94,0.06); }
    .file-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
    .file-card .checkbox {
      position: absolute; top: 0.5rem; left: 0.5rem; z-index: 2;
      width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
    }
    .file-preview {
      height: 160px; background: #0a1a0a; display: flex;
      align-items: center; justify-content: center; overflow: hidden; cursor: pointer;
    }
    .list .file-card { display: flex; flex-direction: row; align-items: center; }
    .list .file-preview { width: 60px; height: 60px; min-width: 60px; }
    .file-preview img, .file-preview video { width: 100%; height: 100%; object-fit: cover; }
    .file-preview .icon-preview { font-size: 3rem; opacity: 0.5; }
    .list .file-preview .icon-preview { font-size: 2rem; }
    .file-info { padding: 0.6rem 0.8rem; }
    .file-info .name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-info .meta { font-size: 0.7rem; color: var(--text2); margin-top: 0.2rem; }
    .file-actions {
      display: flex; gap: 0.2rem; padding: 0 0.8rem 0.6rem; flex-wrap: wrap;
    }
    .file-actions button {
      padding: 0.25rem 0.5rem; border-radius: 1rem; border: 1px solid var(--border);
      background: rgba(34,197,94,0.03); color: var(--text); cursor: pointer; font-size: 0.7rem;
    }
    .file-actions button:hover { background: rgba(34,197,94,0.2); }
    .file-actions .del-btn { color: var(--danger); }
    .empty-state { text-align: center; padding: 4rem; color: var(--text2); }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 1.5rem; padding: 1.5rem;
      text-align: center; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(34,197,94,0.05); }
    .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 0.5rem; display: none; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.3s; }

    /* TOAST */
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast {
      padding: 0.8rem 1.2rem; border-radius: 1rem; font-weight: 600; font-size: 0.9rem;
      animation: slideIn 0.3s ease; color: #052e16;
    }
    .toast.success { background: #86efac; }
    .toast.error { background: #fca5a5; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 0.6rem; font-size: 0.65rem; background: rgba(34,197,94,0.2); margin: 0.1rem; }
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, rgba(74,222,128,0.2) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0.5rem; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    a { color: var(--accent); }

    @media (max-width: 600px) {
      .dash-header { padding: 0.8rem 1rem; }
      .dash-content { padding: 0.8rem; }
      .file-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- HOME -->
  <div id="homePage">
    <div class="hero"><div class="hero-bg"></div>
      <div class="hero-content">
        <h1>Curated Wallpapers</h1>
        <p>Beautiful high-resolution images for your screen</p>
        <button onclick="showLogin()">Enter Collection</button>
      </div>
    </div>
    <div class="gallery-section">
      <h2>✨ Featured</h2>
      <div class="gallery-grid" id="publicGallery"></div>
    </div>
    <button class="login-fab" onclick="showLogin()">🔑 Access Files</button>
  </div>

  <!-- LOGIN -->
  <div id="loginOverlay" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:380px;text-align:center;">
      <h2>Access Files</h2>
      <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="off" />
      <button class="btn" onclick="doLogin()" style="width:100%;margin-top:0.5rem;">Unlock</button>
      <p id="loginError" style="color:var(--danger);font-size:0.85rem;margin-top:0.5rem;"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardPage" class="hidden">
    <div class="dash-header">
      <h1>📁 File Manager</h1>
      <div class="flex-row">
        <button class="btn-outline btn-sm" onclick="toggleTheme()">🌓</button>
        <button class="btn-outline btn-sm" onclick="openCreateFolder()">📁 New Folder</button>
        <button class="btn btn-sm" onclick="openCreateFile()">➕ New File</button>
        <button class="btn-outline btn-sm" onclick="goHome()">← Home</button>
      </div>
    </div>
    <div class="dash-content">
      <!-- Upload -->
      <div class="upload-zone" id="uploadZone">
        <div style="font-size:2rem;">📤</div>
        <p><strong>Click or Drag & Drop files here</strong></p>
        <p style="font-size:0.8rem;opacity:0.7;">All file types supported</p>
        <input type="file" id="fileInput" multiple accept="*/*" />
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <!-- Bulk -->
      <div id="bulkBar" style="display:none;padding:0.5rem;background:var(--accent);border-radius:1rem;margin-bottom:0.5rem;color:#052e16;font-weight:600;" class="flex-row">
        <span id="bulkCount">0 selected</span>
        <button onclick="bulkDelete()" style="background:#dc2626;color:white;border:none;padding:0.3rem 0.8rem;border-radius:1rem;cursor:pointer;">Delete</button>
        <button onclick="clearSelection()" style="background:rgba(0,0,0,0.2);border:none;padding:0.3rem 0.8rem;border-radius:1rem;cursor:pointer;color:#052e16;">Clear</button>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search..." oninput="renderFiles()" />
        <button id="gridBtn" class="active" onclick="setView('grid')">🔲 Grid</button>
        <button id="listBtn" onclick="setView('list')">📋 List</button>
        <select id="sortSelect" onchange="renderFiles()">
          <option value="name-asc">Name A-Z</option><option value="name-desc">Name Z-A</option>
          <option value="date-desc">Newest</option><option value="date-asc">Oldest</option>
          <option value="size-desc">Largest</option><option value="size-asc">Smallest</option>
        </select>
        <button data-filter="all" class="active" onclick="setFilter('all',this)">All</button>
        <button data-filter="image" onclick="setFilter('image',this)">🖼️</button>
        <button data-filter="video" onclick="setFilter('video',this)">🎬</button>
        <button data-filter="audio" onclick="setFilter('audio',this)">🎵</button>
        <button data-filter="raw" onclick="setFilter('raw',this)">📄</button>
        <button onclick="loadFiles()">🔄</button>
      </div>

      <!-- Folder chips -->
      <div class="flex-row" id="folderChips" style="margin-bottom:0.5rem;"></div>

      <!-- Files -->
      <div class="file-grid" id="fileGrid"></div>
    </div>
  </div>

  <!-- PREVIEW MODAL -->
  <div id="previewModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:750px;">
      <button class="modal-close" onclick="closeModal('previewModal')">✕</button>
      <div id="previewContent"></div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
      <h3>✏️ Edit File</h3>
      <p id="editFileName" style="color:var(--text2);"></p>
      <textarea id="editContent"></textarea>
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('editModal')">Cancel</button>
        <button class="btn btn-sm" onclick="saveEdit()">💾 Save</button>
      </div>
    </div>
  </div>

  <!-- RENAME MODAL -->
  <div id="renameModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:380px;">
      <h3>✏️ Rename</h3>
      <input type="text" id="renameInput" placeholder="New filename" />
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('renameModal')">Cancel</button>
        <button class="btn btn-sm" onclick="doRename()">Save</button>
      </div>
    </div>
  </div>

  <!-- CREATE FILE MODAL -->
  <div id="createFileModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>➕ Create New File</h3>
      <input type="text" id="createFileName" placeholder="filename.txt" />
      <textarea id="createFileContent" placeholder="File content..."></textarea>
      <select id="createFileFolder"><option value="">Root folder</option></select>
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('createFileModal')">Cancel</button>
        <button class="btn btn-sm" onclick="createFile()">Create</button>
      </div>
    </div>
  </div>

  <!-- CREATE FOLDER MODAL -->
  <div id="createFolderModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:380px;">
      <h3>📁 New Folder</h3>
      <input type="text" id="folderNameInput" placeholder="Folder name" />
      <div class="flex-row" style="justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-outline btn-sm" onclick="closeModal('createFolderModal')">Cancel</button>
        <button class="btn btn-sm" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const WORKER_URL = 'https://stor-api.bookforpeace.workers.dev';
    const PASSWORD = 'stor-demo';
    const UPLOAD_URL = 'https://api.cloudinary.com/v1_1/dgdlrlyct/auto/upload';
    const UPLOAD_PRESET = 'stor_upload';

    let allFiles = [];
    let filter = 'all';
    let view = 'grid';
    let selected = new Set();
    let currentFolder = '';
    let editTarget = null;
    let renameTarget = null;
    let fileTags = JSON.parse(localStorage.getItem('ft') || '{}');
    let recent = JSON.parse(localStorage.getItem('recent') || '[]');

    // TOAST
    function toast(msg, type='success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2000);
    }

    // THEME
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode')?'light':'dark');
    }
    if(localStorage.getItem('theme')==='light') document.body.classList.add('light-mode');

    // MODALS
    function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', function(e){ if(e.target===this) this.classList.add('hidden'); }));

    // FORMAT SIZE
    function fs(bytes) {
      if(!bytes) return '0 B';
      const u = ['B','KB','MB','GB','TB']; let i=0, s=bytes;
      while(s>=1024&&i<u.length-1){s/=1024;i++;}
      return s.toFixed(i===0?0:1)+' '+u[i];
    }

    function getType(f) {
      if(f.resource_type==='video') return 'video';
      if(f.resource_type==='image') return 'image';
      const fmt=(f.format||'').toLowerCase();
      if(['mp3','wav','ogg','m4a','flac'].includes(fmt)) return 'audio';
      return 'raw';
    }

    function getIcon(f) {
      const fmt=(f.format||'').toLowerCase();
      const icons={pdf:'📕',zip:'📦',rar:'📦',doc:'📝',docx:'📝',xls:'📊',ppt:'📽️',psd:'🎨',js:'💛',py:'🐍',html:'🌐',css:'🎨',json:'📋',txt:'📄',md:'📝'};
      return icons[fmt]||'📄';
    }

    // HOME
    async function loadPublicGallery() {
      try {
        const res = await fetch(`${WORKER_URL}/list`);
        const data = await res.json();
        const imgs = (data.resources||[]).filter(f=>f.resource_type==='image').slice(0,12);
        const grid = document.getElementById('publicGallery');
        grid.innerHTML = imgs.length ? imgs.map(f=>`
          <div class="gallery-card" onclick="showLogin()">
            <img src="${f.secure_url}" loading="lazy" />
            <div class="info"><span>${f.original_filename||'image'}</span><span>${fs(f.bytes)}</span></div>
          </div>`).join('') : '<p style="color:var(--text2);grid-column:1/-1;text-align:center;">No wallpapers yet.</p>';
      } catch(e) {}
    }

    // LOGIN
    function showLogin() { showModal('loginOverlay'); document.getElementById('loginPassword').focus(); }
    function doLogin() {
      if(document.getElementById('loginPassword').value===PASSWORD) {
        closeModal('loginOverlay');
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        loadFiles(); toast('Welcome!');
      } else document.getElementById('loginError').textContent='Wrong password';
    }
    function goHome() {
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('homePage').classList.remove('hidden');
      loadPublicGallery();
    }

    // LOAD FILES
    async function loadFiles() {
      document.getElementById('fileGrid').innerHTML = '<div class="empty-state">⏳ Loading...</div>';
      try {
        const res = await fetch(`${WORKER_URL}/list`);
        const data = await res.json();
        allFiles = data.resources || [];
        buildFolders();
        renderFiles();
      } catch(e) {
        document.getElementById('fileGrid').innerHTML = '<div class="empty-state">⚠️ Failed to load</div>';
      }
    }

    function buildFolders() {
      const folders = new Set();
      allFiles.forEach(f => {
        const parts = (f.public_id||'').split('/');
        if(parts.length>1) folders.add(parts[0]);
        if(f.folder) folders.add(f.folder);
      });
      const chips = document.getElementById('folderChips');
      chips.innerHTML = '<span class="tag" style="cursor:pointer;padding:0.4rem 0.8rem;background:'+(currentFolder?'':'var(--accent)')+';color:'+(currentFolder?'var(--text)':'#052e16')+';border-radius:1rem;" onclick="setFolder(\'\')">📂 All</span>';
      folders.forEach(f => {
        chips.innerHTML += `<span class="tag" style="cursor:pointer;padding:0.4rem 0.8rem;background:${currentFolder===f?'var(--accent)':'rgba(34,197,94,0.1)'};color:${currentFolder===f?'#052e16':'var(--text)'};border-radius:1rem;" onclick="setFolder('${f}')">📁 ${f}</span>`;
      });
      // Update create file folder dropdown
      const sel = document.getElementById('createFileFolder');
      if(sel) { sel.innerHTML = '<option value="">Root</option>' + [...folders].map(f=>`<option value="${f}">${f}</option>`).join(''); }
    }

    function setFolder(f) { currentFolder = f; buildFolders(); renderFiles(); }

    function renderFiles() {
      const grid = document.getElementById('fileGrid');
      grid.className = 'file-grid ' + (view==='list'?'list':'');
      const search = (document.getElementById('searchInput')?.value||'').toLowerCase();
      const sort = document.getElementById('sortSelect')?.value||'date-desc';

      let files = [...allFiles];
      if(filter!=='all') files = files.filter(f=>getType(f)===filter);
      if(currentFolder) files = files.filter(f=>(f.public_id||'').startsWith(currentFolder+'/')||f.folder===currentFolder);
      if(search) files = files.filter(f=>((f.original_filename||'')+'.'+(f.format||'')).toLowerCase().includes(search)||(f.public_id||'').toLowerCase().includes(search)||(fileTags[f.public_id]||[]).join(' ').toLowerCase().includes(search));

      files.sort((a,b)=>{
        switch(sort) {
          case 'name-asc': return ((a.original_filename||'')+a.format).localeCompare((b.original_filename||'')+b.format);
          case 'name-desc': return ((b.original_filename||'')+b.format).localeCompare((a.original_filename||'')+a.format);
          case 'date-asc': return new Date(a.created_at||0)-new Date(b.created_at||0);
          case 'size-desc': return (b.bytes||0)-(a.bytes||0);
          case 'size-asc': return (a.bytes||0)-(b.bytes||0);
          default: return new Date(b.created_at||0)-new Date(a.created_at||0);
        }
      });

      if(!files.length) { grid.innerHTML = '<div class="empty-state"><p>📭 No files</p><button class="btn btn-sm" onclick="openCreateFile()">➕ Create one</button></div>'; return; }

      grid.innerHTML = files.map(f=>{
        const type=getType(f), name=(f.original_filename||'file')+'.'+(f.format||''), size=fs(f.bytes);
        const tags=fileTags[f.public_id]||[], sel=selected.has(f.public_id);
        let prev='';
        if(type==='image') prev=`<img src="${f.secure_url}" loading="lazy" />`;
        else if(type==='video') prev=`<video src="${f.secure_url}" muted></video>`;
        else if(type==='audio') prev=`<div class="icon-preview">🎵</div>`;
        else prev=`<div class="icon-preview">${getIcon(f)}</div>`;
        return `<div class="file-card ${sel?'selected':''}">
          <input type="checkbox" class="checkbox" ${sel?'checked':''} onclick="toggleSelect('${f.public_id}',this)" />
          <div class="file-preview" onclick="previewFile('${f.public_id}','${type}','${f.secure_url}','${name}')">${prev}</div>
          <div class="file-info"><div class="name" title="${name}">${name}</div><div class="meta">${type} · ${size}${tags.length?' · '+tags.map(t=>`<span class="tag">${t}</span>`).join(''):''}</div></div>
          <div class="file-actions">
            <button onclick="copyUrl('${f.secure_url}')">📋</button>
            <button onclick="downloadFile('${f.secure_url}','${name}')">⬇️</button>
            <button onclick="previewFile('${f.public_id}','${type}','${f.secure_url}','${name}')">👁</button>
            <button onclick="openEdit('${f.public_id}','${name}')">✏️</button>
            <button onclick="openRename('${f.public_id}','${name}')">🔤</button>
            <button class="del-btn" onclick="deleteFile('${f.public_id}')">🗑</button>
          </div></div>`;
      }).join('');
      updateBulk();
    }

    function setFilter(f,btn) {
      filter=f;
      document.querySelectorAll('.toolbar button[data-filter]').forEach(b=>b.classList.remove('active'));
      if(btn) btn.classList.add('active');
      renderFiles();
    }
    function setView(v) { view=v; document.getElementById('gridBtn').classList.toggle('active',v==='grid'); document.getElementById('listBtn').classList.toggle('active',v==='list'); renderFiles(); }

    // SELECTION
    function toggleSelect(id,cb) { cb.checked?selected.add(id):selected.delete(id); updateBulk(); renderFiles(); }
    function updateBulk() {
      const bar=document.getElementById('bulkBar'), count=document.getElementById('bulkCount');
      bar.style.display=selected.size?'flex':'none';
      count.textContent=selected.size+' selected';
    }
    function clearSelection() { selected.clear(); updateBulk(); renderFiles(); }
    async function bulkDelete() {
      if(!confirm(`Delete ${selected.size} files?`)) return;
      for(let id of selected) await fetch(`${WORKER_URL}/delete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({publicId:id})});
      toast(`Deleted ${selected.size} files`); selected.clear(); loadFiles();
    }

    // PREVIEW
    function previewFile(id,type,url,name) {
      recent = [id, ...recent.filter(x=>x!==id)].slice(0,20);
      localStorage.setItem('recent',JSON.stringify(recent));
      const content=document.getElementById('previewContent');
      if(type==='image') content.innerHTML=`<img src="${url}" style="width:100%;border-radius:1rem;" />`;
      else if(type==='video') content.innerHTML=`<video src="${url}" controls autoplay style="width:100%;border-radius:1rem;max-height:60vh;"></video>`;
      else if(type==='audio') content.innerHTML=`<div style="text-align:center;padding:2rem;"><h3>🎵 ${name}</h3><audio src="${url}" controls style="width:100%;margin-top:1rem;"></audio></div>`;
      else if(name.endsWith('.pdf')) content.innerHTML=`<iframe src="${url}" style="width:100%;height:60vh;border:none;border-radius:1rem;"></iframe>`;
      else content.innerHTML=`<div style="text-align:center;padding:2rem;"><p>${getIcon({format:name.split('.').pop()})} ${name}</p><a href="${url}" target="_blank">Open</a></div>`;
      showModal('previewModal');
    }

    // EDIT
    async function openEdit(id,name) {
      editTarget={id,name};
      document.getElementById('editFileName').textContent=name;
      try {
        const res=await fetch(`${WORKER_URL}/get-content?publicId=${encodeURIComponent(id)}`);
        const data=await res.json();
        document.getElementById('editContent').value=data.content||'';
      } catch(e) { document.getElementById('editContent').value=''; }
      showModal('editModal');
    }
    async function saveEdit() {
      if(!editTarget) return;
      await fetch(`${WORKER_URL}/edit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({publicId:editTarget.id,content:document.getElementById('editContent').value,filename:editTarget.name})});
      toast('Saved!'); closeModal('editModal'); loadFiles();
    }

    // RENAME
    function openRename(id,name) { renameTarget={id,name}; document.getElementById('renameInput').value=name; showModal('renameModal'); }
    async function doRename() {
      if(!renameTarget) return;
      const nn=document.getElementById('renameInput').value.trim();
      if(!nn) return;
      await fetch(`${WORKER_URL}/rename`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({publicId:renameTarget.id,newName:nn})});
      toast('Renamed!'); closeModal('renameModal'); loadFiles();
    }

    // CREATE FILE
    function openCreateFile() { buildFolders(); showModal('createFileModal'); }
    async function createFile() {
      const name=document.getElementById('createFileName').value.trim();
      const content=document.getElementById('createFileContent').value;
      const folder=document.getElementById('createFileFolder').value;
      if(!name) return toast('Enter filename','error');
      await fetch(`${WORKER_URL}/create`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:name,content,folder})});
      toast('Created!'); closeModal('createFileModal');
      document.getElementById('createFileName').value='';
      document.getElementById('createFileContent').value='';
      loadFiles();
    }

    // CREATE FOLDER
    function openCreateFolder() { showModal('createFolderModal'); }
    async function createFolder() {
      const name=document.getElementById('folderNameInput').value.trim();
      if(!name) return toast('Enter folder name','error');
      await fetch(`${WORKER_URL}/create-folder`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folderName:name})});
      toast('Folder created!'); closeModal('createFolderModal');
      document.getElementById('folderNameInput').value='';
      loadFiles();
    }

    // DELETE
    async function deleteFile(id) {
      if(!confirm('Delete permanently?')) return;
      await fetch(`${WORKER_URL}/delete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({publicId:id})});
      toast('Deleted'); loadFiles();
    }

    // COPY
    function copyUrl(url) { navigator.clipboard.writeText(url).then(()=>toast('Copied!')).catch(()=>prompt('Copy:',url)); }
    function downloadFile(url,name) { const a=document.createElement('a'); a.href=url; a.download=name; a.target='_blank'; a.click(); }

    // UPLOAD
    const uz=document.getElementById('uploadZone');
    uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});
    uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
    uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');if(e.dataTransfer.files.length)upload(e.dataTransfer.files);});
    uz.addEventListener('click',()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change',function(){if(this.files.length)upload(this.files);});

    async function upload(files) {
      const bar=document.getElementById('progressBar'),fill=document.getElementById('progressFill');
      bar.style.display='block'; fill.style.width='0%';
      let done=0;
      for(let file of files) {
        const fd=new FormData();
        fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET);
        if(currentFolder) fd.append('folder',currentFolder);
        try { await fetch(UPLOAD_URL,{method:'POST',body:fd}); done++; fill.style.width=(done/files.length*100)+'%'; }
        catch(e) { toast('Failed: '+file.name,'error'); }
      }
      bar.style.display='none'; toast(`✅ ${done} uploaded!`);
      document.getElementById('fileInput').value=''; loadFiles();
    }

    // KEYBOARD
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape') document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.add('hidden'));
      if(e.ctrlKey&&e.key==='u'){e.preventDefault();document.getElementById('fileInput').click();}
      if(e.key==='Delete'&&selected.size>0&&!document.getElementById('dashboardPage').classList.contains('hidden')) bulkDelete();
    });

    // INIT
    loadPublicGallery();
    document.getElementById('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
  </script>
</body>
</html>
